openapi: 3.0.3
info:
  title: Vocabulary API
  version: 0.1.0
  description: MVP API contract for Vocabulary monorepo
servers:
  - url: http://localhost:8080
paths:
  /v1/auth/login:
    post:
      summary: Admin login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
        '400':
          description: Invalid request body or missing fields
        '401':
          description: Invalid credentials
        '503':
          description: Bootstrap admin is not configured

  /v1/admins:
    post:
      summary: Create new admin
      tags: [Admins]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  default: admin
      responses:
        '201':
          description: Admin created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /v1/vocabulary:
    post:
      summary: Add vocabulary
      tags: [Vocabulary]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [word, translation]
              properties:
                word:
                  type: string
                translation:
                  type: string
                example:
                  type: string
      responses:
        '201':
          description: Vocabulary created
        '401':
          description: Unauthorized

    get:
      summary: List/Search vocabularies
      tags: [Vocabulary]
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Vocabulary list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        word:
                          type: string
                        translation:
                          type: string
                        example:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

