syntax = "proto3";

package auth.v1;

option go_package = "vocabulary/backend/proto/auth/v1;authv1";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc CreateAdmin(CreateAdminRequest) returns (Admin);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string token_type = 2;
  int32 expires_in = 3;
}

message CreateAdminRequest {
  string email = 1;
  string password = 2;
  string role = 3;
}

message Admin {
  string id = 1;
  string email = 2;
  string role = 3;
  string created_at = 4;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
}
